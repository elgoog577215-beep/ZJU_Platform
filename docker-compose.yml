version: '3.8'

services:
  # ============================================
  # Production Service
  # ============================================
  app:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: lumos-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/app/data/database.sqlite
      - UPLOAD_DIR=/app/server/uploads
      - LOG_LEVEL=info
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://tuotuzju.com,http://118.31.78.72}
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      - ./data:/app/data
      - ./uploads:/app/server/uploads
      - ./logs:/app/server/logs
    networks:
      - lumos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Development Service
  # ============================================
  dev:
    build:
      context: .
      target: development
      dockerfile: Dockerfile
    container_name: lumos-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - JWT_SECRET=dev-secret-key-change-in-production
      - DB_PATH=./data/database.sqlite
      - UPLOAD_DIR=./uploads
      - LOG_LEVEL=debug
      - CORS_ORIGIN=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5180
    volumes:
      - .:/app
      - /app/node_modules
      - /app/server/node_modules
      - ./data:/app/data
      - ./uploads:/app/uploads
    networks:
      - lumos-network
    command: npm run dev

  # ============================================
  # Nginx Reverse Proxy (Optional)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: lumos-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - lumos-network
    profiles:
      - with-nginx

  # ============================================
  # Database Backup Service
  # ============================================
  backup:
    build:
      context: .
      target: production
      dockerfile: Dockerfile
    container_name: lumos-backup
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/database.sqlite
      - BACKUP_DIR=/app/backups
      - BACKUP_RETENTION_DAYS=30
    volumes:
      - ./data:/app/data:ro
      - ./backups:/app/backups
    networks:
      - lumos-network
    command: >
      sh -c "
        while true; do
          node scripts/backup.js
          sleep 86400
        done
      "
    profiles:
      - with-backup

networks:
  lumos-network:
    driver: bridge

volumes:
  data:
  uploads:
  logs:
  backups:
