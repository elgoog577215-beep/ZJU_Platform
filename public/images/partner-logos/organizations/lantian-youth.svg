<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">蓝田青年 organization mark</title>
  <desc id="desc">Local visual mark for 蓝田青年 on Tuotu ZJU.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="18" x2="182" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="68%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f766e" flood-opacity="0.22"/>
    </filter>
