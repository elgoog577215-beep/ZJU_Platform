  <path d="M46 158h108" stroke="#fff" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>
  <g opacity="0.24"><path d="M100 146V82" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/><path d="M98 94c-32 0-45-18-48-44 28 0 45 16 48 44Z" fill="#ffffff" opacity="0.72"/><path d="M102 106c34-3 49-22 49-51-29 3-47 22-49 51Z" fill="#ffffff" opacity="0.58"/></g>
