<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="title desc">
  <title id="title">浙江大学学生会 organization mark</title>
  <desc id="desc">Local visual mark for 浙江大学学生会 on Tuotu ZJU.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="18" x2="182" y2="182" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="shine" cx="35%" cy="25%" r="68%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect x="18" y="18" width="164" height="164" rx="36" fill="url(#bg)" filter="url(#softShadow)"/>
  <rect x="26" y="26" width="148" height="148" rx="30" fill="url(#shine)"/>
  <path d="M46 158h108" stroke="#fff" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>
  <g opacity="0.24"><path d="M100 42 148 60v36c0 36-18 54-48 70-30-16-48-34-48-70V60Z" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/><path d="M76 95h48M100 70v62" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/></g>
  <circle cx="150" cy="50" r="18" fill="#fff" opacity="0.12"/>
  <text x="100" y="111" text-anchor="middle" dominant-baseline="middle" font-family="Avenir Next, Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="54" font-weight="900" letter-spacing="0" fill="#fff">学</text>
  <text x="100" y="148" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#fff" opacity="0.82">ZJU</text>
