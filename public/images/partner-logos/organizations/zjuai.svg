  <g opacity="0.24"><circle cx="64" cy="72" r="9" fill="#ffffff" opacity="0.85"/><circle cx="136" cy="78" r="9" fill="#ffffff" opacity="0.7"/><circle cx="104" cy="130" r="9" fill="#ffffff" opacity="0.6"/><path d="M72 76 128 79M132 86 110 122M98 122 69 81" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/></g>
