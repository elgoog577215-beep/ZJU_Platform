  <text x="100" y="111" text-anchor="middle" dominant-baseline="middle" font-family="Avenir Next, Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="54" font-weight="900" letter-spacing="0" fill="#fff">AI</text>
  <text x="100" y="148" text-anchor="middle" font-family="Avenir Next, Helvetica Neue, Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="14" font-weight="800" letter-spacing="0" fill="#fff" opacity="0.82">ZJU</text>
