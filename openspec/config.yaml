schema: spec-driven
context: |
  Project: ZJU_Platform
  Frontend: React 18 + Vite + TailwindCSS
  Backend: Node.js + Express + SQLite
  Languages: zh-CN primary with multilingual locales
  Main domain: campus content aggregation (events, articles, podcasts, gallery, videos)
  Routing: react-router-dom
  API prefix: /api via Vite proxy
  Important commands:
    - npm run dev
    - npm run lint
    - npm run build
    - npm run test:e2e:smoke
rules:
  proposal:
    - Define user-visible impact and non-goals clearly.
    - Include API and data model impact when backend changes are involved.
    - Include rollback strategy for risky changes.
  design:
    - Specify frontend and backend responsibilities separately.
    - Prefer reuse of existing components and utilities before adding new files.
    - Include accessibility and performance considerations for UI changes.
  tasks:
    - Keep tasks small, independently testable, and ordered by dependency.
    - Include verification tasks for lint and build at minimum.
    - Include data safety checks for any delete, migration, or destructive operation.
